<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy | Financiamento Caixa Rose Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Rose Gold Metálico com Brilho Real */
            --rose-shine: linear-gradient(135deg, #fce0d3 0%, #e5b299 25%, #b38b78 50%, #e5b299 75%, #fce0d3 100%);
            --bronze: #e5b299;
            --black: #050505;
            --card-black: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--black); color: #f2f2f2; line-height: 1.6; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* CABEÇALHO Premium CDO Roberta (MENSAGEM ESTILOSA) */
        header { 
            background: #000; padding: 20px 5%; display: flex; flex-direction: column; align-items: center; 
            border-bottom: 2px solid #b38b78; position: sticky; top: 0; z-index: 1000;
        }
        .welcome-msg { 
            font-family: 'Playfair Display', serif; font-size: 1.5rem; text-align: center; margin-bottom: 15px; 
            background: var(--rose-shine); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-contact { display: flex; gap: 20px; align-items: center; }
        .logo-header { height: 75px; border-radius: 20px; border: 1px solid #b38b78; }
        .btn-header-whats { background: var(--rose-shine); color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 0.8rem; }

        /* HERO COM BANNER PELA METADE E FILTRO (CLEAN) */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('download.png'); /* Corrigido para .png */
            height: 35vh; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .hero h1 { 
            font-size: 3rem; background: var(--rose-shine); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px; text-shadow: 0 0 15px rgba(229, 178, 153, 0.2);
        }
        .hero p { color: #fce0d3; font-size: 1.2rem; font-weight: 300; }

        .section { padding: 60px 10%; text-align: center; }
        .section-title { font-size: 2.2rem; color: var(--bronze); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        /* SEÇÃO TATIANE - AUTORIDADE (CORRIGIDA E Premium) */
        .perfil-container { background: var(--card-black); display: flex; align-items: center; gap: 40px; padding: 40px; border-radius: 30px; border: 1px solid #222; margin-top: 30px; text-align: left; }
        .perfil-img { width: 300px; height: 300px; border-radius: 30px; border: 3px solid var(--bronze); object-fit: cover; box-shadow: 0 0 25px rgba(179, 139, 120, 0.2); }
        .perfil-text h2 { font-size: 2.5rem; color: var(--bronze); margin-bottom: 10px; }
        .caixa-logo { width: 140px; border-radius: 10px; margin-top: 20px; }

        /* EMPREENDIMENTOS COM EFEITO DE HOVER CDO Roberta (FORMATO .PNG) */
        .grid-obras { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 30px; }
        .card-obra { background: #000; border-radius: 25px; overflow: hidden; border: 1px solid #333; position: relative; transition: 0.3s; }
        .card-obra:hover { border-color: var(--bronze); transform: translateY(-10px); }
        
        .img-hover-container { position: relative; width: 100%; height: 240px; }
        .card-obra img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; transition: opacity 0.5s ease-in-out; }
        
        .img-b { opacity: 0; }
        
        .card-obra:hover .img-a { opacity: 0; }
        .card-obra:hover .img-b { opacity: 1; }

        .card-obra h3 { padding: 20px; color: var(--bronze); text-align: center; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }

        footer { padding: 40px; text-align: center; background: #000; border-top: 1px solid #222; color: #666; font-size: 0.8rem; }
        .whatsapp { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; text-decoration: none; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
