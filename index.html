<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Legacy | Financiamento Caixa Rose Gold e Imóveis Araraquara</title>
    <meta name="description" content="Saia do aluguel com a Legacy. Especialista em Financiamento Minha Casa Minha Vida Rose Gold em Araraquara. Fale com Tatiane, sua CCA Oficial de Elite.">
    <meta name="keywords" content="imobiliária araraquara, comprar casa araraquara, alugar casa araraquara, financiamento caixa, minha casa minha vida, sair do aluguel, legacy consultoria imobiliária, correspondente caixa aqui">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* PALETA PRETO E ROSE GOLD DE ELITE */
            --bg-deep-black: #080808; /* Preto absoluto para profundidade */
            --bg-card-black: #121212; /* Preto ligeiramente mais claro para cards */
            --rose-gold-gradient: linear-gradient(135deg, #e5b299 0%, #b38b78 100%); /* Degradê metalizado */
            --rose-gold-text: #e5b299; /* Cor fixa para texto menor */
            --light-gold: #f4d0bc; /* Ouro claro para contraste suave */
            --text-on-black: #f9f9f9; /* Branco suave para leitura */
            --white: #ffffff;
            --success: #25d366;
            --font-main: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { background-color: var(--bg-deep-black); color: var(--text-on-black); line-height: 1.6; }

        /* CABEÇALHO LIMPO E ARREDONDADO */
        header { 
            background: var(--bg-card-black); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(229, 178, 153, 0.1); 
            border-bottom: 2px solid #b38b78; /* Linha sutil bronze */
        }
        
        .logo-container { display: flex; align-items: center; }
        /* LOGO ARREDONDADO DA PARCEIRA ROBERTA */
        .logo-container img { 
            height: 70px; 
            width: auto; 
            border-radius: 12px; /* Bordas arredondadas no logo */
            box-shadow: 0 2px 8px rgba(229, 178, 153, 0.2);
        }

        .hero { 
            background: linear-gradient(rgba(8,8,8,0.85), rgba(8,8,8,0.85)), 
                        url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=1350&q=80'); 
            height: 70vh; 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--white); 
            text-align: center; 
            padding: 0 20px; 
            border-bottom: 3px solid #b38b78; /* Linha bronze grossa no final do hero */
        }
        
        .hero h1 { 
            font-size: 3.5rem; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 700;
            background: var(--rose-gold-gradient); /* Texto degradê Rose Gold */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero p { font-size: 1.4rem; margin-bottom: 30px; font-weight: 300; color: var(--light-gold); }

        .btn-whats { 
            background: var(--success); 
            color: var(--white); 
            padding: 18px 35px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            display: inline-block; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            font-size: 1.1rem;
        }
        
        /* BOTÃO WHATSAPP NO CABEÇALHO NOVO */
        .btn-header { 
            background: var(--rose-gold-gradient); 
            color: var(--white); 
            padding: 10px 20px; 
            border-radius: 20px; 
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(229, 178, 153, 0.2);
        }

        .section { padding: 80px 10%; }
